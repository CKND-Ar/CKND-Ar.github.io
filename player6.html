<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Playpen Sans Arabic',sans-serif;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

body::before{
    content:"";
    position:fixed;
    width:500px;
    height:500px;
    background:#00bfff22;
    border-radius:50%;
    filter:blur(120px);
    top:-100px;
    right:-100px;
    animation:float1 8s infinite alternate;
}

body::after{
    content:"";
    position:fixed;
    width:400px;
    height:400px;
    background:#00ff8822;
    border-radius:50%;
    filter:blur(120px);
    bottom:-100px;
    left:-100px;
    animation:float2 8s infinite alternate;
}

@keyframes float1{
    from{transform:translateY(0);}
    to{transform:translateY(80px);}
}

@keyframes float2{
    from{transform:translateY(0);}
    to{transform:translateY(-80px);}
}

.container{
    width:95%;
    max-width:900px;
    text-align:center;
    padding:30px 15px;
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.title{
    font-size:clamp(28px,5vw,45px);
    margin-bottom:15px;
    text-shadow:0 0 15px #00bfff;
}

.subtitle{
    font-size:clamp(16px,3vw,22px);
    margin-bottom:30px;
    color:#ddd;
}

.servers{
    display:flex;
    justify-content:center;
    gap:0;
    margin-bottom:35px;
    flex-wrap:wrap;
}

.server{
    display:block;
    width:280px;
    overflow:hidden;
    transition:.4s;
    position:relative;
}

.server img{
    width:100%;
    display:block;
}

.server:hover{
    transform:translateY(-8px) scale(1.04);
    z-index:2;
    filter:drop-shadow(0 0 20px #00bfff);
}

.download-btn{
    display:inline-block;
    padding:18px 55px;
    border-radius:60px;
    text-decoration:none;
    color:#fff;
    font-size:22px;
    font-weight:bold;
    background:linear-gradient(135deg,#00bfff,#00ff88);
    box-shadow:
    0 0 15px #00bfff,
    0 0 35px #00ff88;
    transition:.4s;
    position:relative;
    overflow:hidden;
}

.download-btn::before{
    content:"";
    position:absolute;
    top:0;
    left:-120%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.25);
    transform:skewX(-25deg);
    transition:.6s;
}

.download-btn:hover::before{
    left:120%;
}

.download-btn:hover{
    transform:scale(1.08);
    box-shadow:
    0 0 25px #00bfff,
    0 0 55px #00ff88;
}

.download-btn:active{
    transform:scale(.95);
}

.note{
    margin-top:20px;
    color:#aaa;
    font-size:14px;
}

@media(max-width:650px){

    .servers{
        flex-direction:row;
    }

    .server{
        width:48%;
    }

    .download-btn{
        width:100%;
        max-width:350px;
        font-size:20px;
    }
}
</style>
